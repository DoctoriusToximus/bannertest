<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy — Meine Projekte</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8a96e;
    --gold-dim: #7a6035;
    --white: #f0ece4;
    --white-dim: rgba(240,236,228,0.55);
    --white-faint: rgba(240,236,228,0.12);
    --bg: #070709;
    --bg2: #0d0d11;
    --border: rgba(200,169,110,0.18);
    --border-hover: rgba(200,169,110,0.5);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARS */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 22%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 68% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 33%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 92% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 62% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 95%, rgba(255,255,255,0.4) 0%, transparent 100%);
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.4rem 3rem;
    background: linear-gradient(to bottom, rgba(7,7,9,0.95), transparent);
    border-bottom: 1px solid transparent;
    transition: border-color 0.4s, background 0.4s;
  }
  nav.scrolled {
    background: rgba(7,7,9,0.97);
    border-bottom-color: var(--border);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 0.12em;
    color: var(--gold); text-decoration: none;
  }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 400; font-size: 0.82rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--white-dim);
    text-decoration: none; transition: color 0.3s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }

  /* HERO */
  .hero {
    position: relative; z-index: 1;
    height: 100vh; min-height: 600px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-moon {
    position: absolute;
    width: 200px; height: 200px;
    top: 12%; left: 50%; transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #ffffff 0%, #f5f0e0 40%, #c8b88a 70%, #8a7050 100%);
    box-shadow:
      0 0 60px 30px rgba(255,250,220,0.25),
      0 0 120px 60px rgba(200,169,110,0.12),
      0 0 240px 100px rgba(200,169,110,0.06);
    animation: moonPulse 6s ease-in-out infinite;
  }
  @keyframes moonPulse {
    0%,100% { box-shadow: 0 0 60px 30px rgba(255,250,220,0.25),0 0 120px 60px rgba(200,169,110,0.12),0 0 240px 100px rgba(200,169,110,0.06); }
    50%      { box-shadow: 0 0 80px 40px rgba(255,250,220,0.32),0 0 160px 80px rgba(200,169,110,0.18),0 0 300px 120px rgba(200,169,110,0.09); }
  }
  .hero-clouds {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 30% at 15% 60%, rgba(30,28,40,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 50% 25% at 80% 50%, rgba(25,23,35,0.85) 0%, transparent 65%),
      radial-gradient(ellipse 40% 20% at 45% 75%, rgba(20,18,30,0.8) 0%, transparent 60%);
  }
  .hero-glow {
    position: absolute;
    width: 600px; height: 400px;
    top: 0; left: 50%; transform: translateX(-50%);
    background: radial-gradient(ellipse at center top, rgba(200,169,110,0.08) 0%, transparent 70%);
  }
  .hero-content {
    position: relative; text-align: center;
    margin-top: 160px;
    animation: fadeUp 1.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 8rem);
    letter-spacing: 0.06em; line-height: 0.9;
    color: var(--white);
    text-shadow: 0 0 80px rgba(200,169,110,0.3);
  }
  .hero-title span { color: var(--gold); }
  .hero-sub {
    margin-top: 1.5rem; font-size: 0.95rem;
    letter-spacing: 0.08em; color: var(--white-dim); font-weight: 300;
  }
  .hero-scroll {
    position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--white-dim);
    animation: bounce 2.5s ease-in-out infinite;
  }
  .hero-scroll::after {
    content: ''; display: block; width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--gold-dim), transparent);
  }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(6px); }
  }

  /* SECTION */
  section { position: relative; z-index: 1; }
  .section-header {
    padding: 5rem 3rem 2rem;
    display: flex; align-items: baseline; gap: 2rem;
  }
  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; letter-spacing: 0.06em; color: var(--white);
  }
  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }
  .section-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.2em; color: var(--gold-dim);
  }

  /* GALLERY */
  .gallery {
    padding: 0 2rem 6rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 480px), 1fr));
    gap: 2px;
  }

  /* BANNER CARD */
  .banner-card {
    position: relative; overflow: hidden;
    background: #0a0a0c; cursor: pointer;
    border: 1px solid var(--border);
    transition: border-color 0.4s;
  }
  .banner-card:hover { border-color: var(--border-hover); }

  .banner-frame {
    position: relative; width: 100%; overflow: hidden;
    background: #111118;
  }
  .banner-frame img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.8s cubic-bezier(0.23,1,0.32,1);
  }
  .banner-card:hover .banner-frame img { transform: scale(1.04); }

  .banner-frame .no-image {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #0f0f14 0%, #1a1a22 50%, #0d0d12 100%);
    color: var(--white-faint);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 0.2em;
    padding: 2rem;
  }

  .banner-overlay {
    position: absolute; inset: 0;
    background: rgba(7,7,9,0);
    transition: background 0.4s;
    display: flex; align-items: center; justify-content: center;
  }
  .banner-card:hover .banner-overlay { background: rgba(7,7,9,0.3); }
  .banner-zoom {
    width: 44px; height: 44px;
    border: 1px solid rgba(200,169,110,0.7); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 1.2rem;
    opacity: 0; transform: scale(0.8);
    transition: opacity 0.3s, transform 0.3s;
  }
  .banner-card:hover .banner-zoom { opacity: 1; transform: scale(1); }

  .banner-meta {
    padding: 1rem 1.25rem 1.2rem;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
  }
  .banner-title-text {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
    font-size: 1rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--white);
  }
  .banner-sub {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 300;
    font-size: 0.7rem; letter-spacing: 0.12em; color: var(--white-dim); margin-top: 0.2rem;
  }
  .banner-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); border: 1px solid var(--gold-dim);
    padding: 0.2rem 0.5rem; border-radius: 2px;
    white-space: nowrap; align-self: center; flex-shrink: 0;
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    padding: 5rem 2rem; text-align: center;
    color: var(--white-dim);
  }
  .empty-icon {
    font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3;
  }
  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 0.1em;
    color: var(--white-dim); margin-bottom: 0.5rem;
  }
  .empty-body {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem; letter-spacing: 0.12em; line-height: 1.8;
  }
  .empty-body code {
    color: var(--gold); background: var(--white-faint);
    padding: 0.1rem 0.4rem; border-radius: 2px;
    font-family: 'Courier New', monospace; font-size: 0.85em;
  }

  /* ERROR BANNER */
  .error-notice {
    display: none;
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: #1a0a0a; border: 1px solid rgba(200,80,80,0.4);
    color: rgba(220,140,140,0.9);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem; letter-spacing: 0.1em;
    padding: 0.8rem 1.5rem; z-index: 500;
    max-width: 90vw; text-align: center;
  }
  .error-notice.show { display: block; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(4,4,6,0.97);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
    padding: 2rem;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox-img-wrap {
    max-width: 92vw; max-height: 72vh;
    border: 1px solid var(--border); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-img-wrap img {
    display: block; max-width: 92vw; max-height: 72vh; object-fit: contain;
  }
  .lightbox-caption { margin-top: 1.5rem; text-align: center; }
  .lightbox-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 0.1em; color: var(--white);
  }
  .lightbox-meta {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.15em; color: var(--gold-dim);
    margin-top: 0.4rem; display: flex; gap: 1.5rem; justify-content: center;
  }
  .lightbox-close {
    position: absolute; top: 1.5rem; right: 2rem;
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.2em;
    color: var(--white-dim); cursor: pointer; transition: color 0.3s;
    border: none; background: none; padding: 0.5rem;
  }
  .lightbox-close:hover { color: var(--gold); }

  /* FOOTER */
  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.15em; color: var(--gold-dim);
  }
  .footer-note {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; letter-spacing: 0.15em; color: var(--white-faint);
  }
</style>
</head>
<body>

<div class="stars"></div>

<nav id="nav">
  <a href="#" class="nav-logo">Happy</a>
  <ul class="nav-links">
    <li><a href="#hero">Startseite</a></li>
    <li><a href="#projekte" class="active">Meine Projekte</a></li>
    <li><a href="#kontakt">Kontakt</a></li>
  </ul>
</nav>

<div class="hero" id="hero">
  <div class="hero-moon"></div>
  <div class="hero-clouds"></div>
  <div class="hero-glow"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Portfolio — Banner Design</p>
    <h1 class="hero-title">Meine<br><span>Projekte</span></h1>
    <p class="hero-sub">Eine Sammlung meiner Banner-Arbeiten</p>
  </div>
  <div class="hero-scroll">Scroll</div>
</div>

<section id="projekte">
  <div class="section-header">
    <span class="section-label">Banner</span>
    <div class="section-line"></div>
    <span class="section-count" id="count">Lädt…</span>
  </div>
  <div class="gallery" id="gallery"></div>
</section>

<footer id="kontakt">
  <span class="footer-logo">Happy</span>
  <span class="footer-note">Banner Portfolio &mdash; Alle Rechte vorbehalten</span>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕ Schließen</button>
  <div class="lightbox-img-wrap">
    <img id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-caption">
    <div class="lightbox-title" id="lightboxTitle"></div>
    <div class="lightbox-meta">
      <span id="lightboxDim"></span>
      <span id="lightboxTag"></span>
      <span id="lightboxDate"></span>
    </div>
  </div>
</div>

<div class="error-notice" id="errorNotice"></div>

<script>
  const gallery   = document.getElementById('gallery');
  const countEl   = document.getElementById('count');
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lightboxImg');
  const lbTitle   = document.getElementById('lightboxTitle');
  const lbDim     = document.getElementById('lightboxDim');
  const lbTag     = document.getElementById('lightboxTag');
  const lbDate    = document.getElementById('lightboxDate');
  const errNotice = document.getElementById('errorNotice');

  function showError(msg) {
    errNotice.textContent = msg;
    errNotice.classList.add('show');
  }

  function openLightbox(b) {
    lbImg.src   = b.file || '';
    lbImg.alt   = b.title || '';
    lbTitle.textContent = b.title || 'Ohne Titel';
    lbDim.textContent   = b.width && b.height ? b.width + ' × ' + b.height + ' px' : '';
    lbTag.textContent   = b.tag  || '';
    lbDate.textContent  = b.date || '';
    lightbox.classList.add('open');
  }

  function renderCard(b) {
    const card = document.createElement('div');
    card.className = 'banner-card';

    const ar = (b.width && b.height) ? (b.width / b.height) : 3;
    const frameStyle = `aspect-ratio: ${ar} / 1;`;

    const imgHtml = b.file
      ? `<img src="${b.file}" alt="${b.title || ''}" loading="lazy">`
      : `<div class="no-image">Kein Bild hinterlegt</div>`;

    const subParts = [];
    if (b.width && b.height) subParts.push(b.width + ' × ' + b.height + ' px');
    if (b.date) subParts.push(b.date);
    const subHtml = subParts.length
      ? `<div class="banner-sub">${subParts.join(' &nbsp;·&nbsp; ')}</div>`
      : '';

    const tagHtml = b.tag ? `<span class="banner-tag">${b.tag}</span>` : '';

    card.innerHTML = `
      <div class="banner-frame" style="${frameStyle}">
        ${imgHtml}
        <div class="banner-overlay">
          <div class="banner-zoom">⤢</div>
        </div>
      </div>
      <div class="banner-meta">
        <div>
          <div class="banner-title-text">${b.title || 'Ohne Titel'}</div>
          ${subHtml}
        </div>
        ${tagHtml}
      </div>
    `;

    if (b.file) {
      card.querySelector('.banner-overlay').addEventListener('click', () => openLightbox(b));
    }

    return card;
  }

  function renderEmpty() {
    const el = document.createElement('div');
    el.className = 'empty-state';
    el.innerHTML = `
      <div class="empty-icon">◯</div>
      <div class="empty-title">Keine Banner gefunden</div>
      <div class="empty-body">
        Füge Einträge in <code>banners.json</code> hinzu und lege<br>
        deine Bilder in den <code>images/</code> Ordner.
      </div>
    `;
    gallery.appendChild(el);
  }

  async function loadBanners() {
    try {
      const res = await fetch('banners.json?_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const banners = await res.json();

      if (!Array.isArray(banners) || banners.length === 0) {
        countEl.textContent = '0 Projekte';
        renderEmpty();
        return;
      }

      countEl.textContent = banners.length + ' Projekt' + (banners.length !== 1 ? 'e' : '');
      banners.forEach(b => gallery.appendChild(renderCard(b)));

    } catch (e) {
      countEl.textContent = 'Fehler';
      showError('banners.json konnte nicht geladen werden. Stelle sicher, dass du die Seite über einen lokalen Server öffnest (z.B. mit Live Server in VS Code).');
      renderEmpty();
    }
  }

  // Lightbox close
  document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

  // Nav scroll
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));

  loadBanners();
</script>
</body>
</html>
